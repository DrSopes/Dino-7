project:
  title:        "Dino-7: 7-Segment Runner Game"
  author:       "Dr.Sopes"
  discord:      ""
  description:  >
    A minimalist single-button endless runner game inspired by the Chrome Dinosaur
    game, rendered on a single 7-segment display. Features an FSM (RUN/JUMP/HIT/SCORE),
    an 8-bit Galois LFSR for pseudo-random obstacle generation, collision detection,
    progressive speed increase, and scorekeeping — all within a 1x1 digital tile.
  language:     "Verilog"
  clock_hz:     25000000

  inputs:
    - "Jump button (active high)"
    - "Reset game (active high)"
    - "LFSR seed bit 2 (optional, read at reset)"
    - "LFSR seed bit 3 (optional, read at reset)"
    - "LFSR seed bit 4 (optional, read at reset)"
    - "LFSR seed bit 5 (optional, read at reset)"
    - "LFSR seed bit 6 (optional, read at reset)"
    - "LFSR seed bit 7 (optional, read at reset)"

  outputs:
    - "Segment a (unused)"
    - "Segment b – player in air (jumping)"
    - "Segment c – obstacle far (spawning)"
    - "Segment d – ground (always on)"
    - "Segment e – player on ground"
    - "Segment f – obstacle close (collision zone)"
    - "Segment g – obstacle mid (approaching)"
    - "Decimal point – jump cooldown active"

  bidirectional:
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""
    - ""

  # Verilog source files (relative to src/ folder)
  source_files:
    - "tt_um_dino7.v"

  top_module: "tt_um_dino7"
